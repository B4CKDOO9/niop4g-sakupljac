<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; frame-src https://accounts.google.com;" />
    <link rel="stylesheet" href="styles.css">
    <title>Sakupljač</title>
</head>

<body>
    <!-- Izbornik -->
    <div id="menu">
        <div id="menu-content">
            <h1>Sakupljač</h1>
            <button id="new-game-btn">Nova Igra</button>
            <button id="online-game-btn">Online Igra</button>
            <button id="leaderboard-btn">Leaderboard</button>
        </div>
    </div>

    <!-- Ekran za prijavu (online mod) -->
    <div id="auth-screen" style="display:none;">
        <div id="auth-content">
            <h1>Sakupljač — Online</h1>
            <p id="auth-status">Prijavite se za online igru.</p>
            <button id="sign-in-btn">Prijavi se s Google računom</button>
            <button id="auth-cancel-btn">Odustani</button>
        </div>
    </div>

    <!-- Online lobby -->
    <div id="online-lobby" style="display:none;">
        <div id="online-lobby-content">
            <div id="user-bar">
                <span id="user-display-name"></span>
                <button id="sign-out-btn">Odjavi se</button>
            </div>
            <h1>Sakupljač — Online</h1>
            <button id="create-game-btn">Nova Igra</button>
            <button id="join-game-btn">Pridruži se</button>
            <button id="online-leaderboard-btn">Leaderboard</button>
            <button id="online-back-btn">Natrag</button>

            <div id="create-game-options" style="display:none; margin-top:12px;">
                <label for="lobby-grid-size" style="display:block; margin-bottom:5px;">Veličina polja:</label>
                <select id="lobby-grid-size" style="width:150px; margin-bottom:10px; padding:5px;">
                    <option value="4">4×4</option>
                    <option value="6" selected>6×6</option>
                    <option value="8">8×8</option>
                    <option value="10">10×10</option>
                    <option value="12">12×12</option>
                </select>
                <br>
                <button id="confirm-create-btn">Stvori sobu</button>
                <button id="cancel-create-btn">Odustani</button>
            </div>

            <div id="waiting-room" style="display:none; margin-top:12px;">
                <p>Čekanje protivnika... Kod sobe:</p>
                <h2 id="room-code-display" style="letter-spacing:4px; font-size:2em;"></h2>
                <button id="cancel-wait-btn">Odustani</button>
            </div>

            <div id="join-room-form" style="display:none; margin-top:12px;">
                <input type="text" id="room-code-input" placeholder="Kod sobe" maxlength="6"
                    style="text-transform:uppercase; width:150px; padding:5px; display:block; margin-bottom:8px;" />
                <button id="confirm-join-btn">Pridruži se</button>
                <button id="cancel-join-btn">Odustani</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za unos imena (lokalni mod) -->
    <div id="name-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Unesite Imena Igrača</h2>
            <input type="text" id="player1-name" placeholder="Ime igrača 1" />
            <input type="text" id="player2-name" placeholder="Ime igrača 2" />
            <label for="grid-size-select" style="margin-top:8px; display:block; font-size:14px;">Veličina polja:</label>
            <select id="grid-size-select" style="width:214px; margin:5px 0 10px; padding:5px;">
                <option value="4">4×4</option>
                <option value="6" selected>6×6</option>
                <option value="8">8×8</option>
                <option value="10">10×10</option>
                <option value="12">12×12</option>
            </select>
            <div class="dialog-buttons">
                <button id="start-btn" class="dialog-btn">Započni Igru</button>
                <button id="cancel-btn" class="dialog-btn secondary">Odustani</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za kraj igre -->
    <div id="game-over-dialog" class="dialog">
        <div class="dialog-content">
            <h2 id="game-over-title">Kraj Igre!</h2>
            <p id="game-over-message"></p>
            <div class="dialog-buttons">
                <button id="new-game-after-btn" class="dialog-btn">Nova Igra</button>
                <button id="menu-btn" class="dialog-btn secondary">Glavni Izbornik</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za leaderboard -->
    <div id="leaderboard-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Leaderboard</h2>
            <div id="leaderboard-list"></div>
            <div class="dialog-buttons">
                <button id="close-leaderboard-btn">Zatvori</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za potvrdu reseta -->
    <div id="confirm-reset-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Resetiraj Igru</h2>
            <p>Jeste li sigurni da želite resetirati igru?</p>
            <div class="dialog-buttons">
                <button id="confirm-reset-btn" class="dialog-btn">Da</button>
                <button id="cancel-reset-btn" class="dialog-btn secondary">Ne</button>
            </div>
        </div>
    </div>

    <!-- Generički info dijalog -->
    <div id="info-dialog" class="dialog">
        <div class="dialog-content">
            <p id="info-message"></p>
            <div class="dialog-buttons">
                <button id="close-info-btn" class="dialog-btn">OK</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za pravila -->
    <div id="rules-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Pravila</h2>
            <p style="font-size: 18px; margin: 20px 0;">Priča je jednostavna, majmune.</p>
            <div class="dialog-buttons">
                <button id="close-rules-btn">Zatvori</button>
            </div>
        </div>
    </div>

    <!-- Područje igre -->
    <div id="game-area" style="display: none;">
        <div id="game-container">
            <!-- Zaglavlje s imenima i rezultatima -->
            <div id="game-header">
                <div class="player-info player1-info">
                    <div class="player-name" id="player1-display"></div>
                    <div class="player-score" id="player1-score">0</div>
                </div>
                <div id="status"></div>
                <div class="player-info player2-info">
                    <div class="player-name" id="player2-display"></div>
                    <div class="player-score" id="player2-score">0</div>
                </div>
            </div>

            <!-- Mreža igre -->
            <div id="grid"></div>

            <!-- Gumbi -->
            <div id="game-controls">
                <button id="reset-btn" class="control-btn">Resetiraj Igru</button>
                <button id="back-to-menu-btn" class="control-btn secondary">Glavni Izbornik</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script type="module" src="online.js"></script>
</body>

</html>
